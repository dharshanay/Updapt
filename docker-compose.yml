services:
  nginx:
    image: nginx:alpine
    container_name: updapt-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    image: dharshanay/frontend:latest
    container_name: updapt-frontend
    expose:
      - "80"
    restart: unless-stopped

  backend:
    image: dharshanay/backend:latest
    container_name: updapt-backend
    expose:
      - "5000"
    restart: unless-stopped