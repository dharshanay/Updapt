name: Deploy to Azure Windows VM

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: dharshanay/updapt-backend:latest
          
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: dharshanay/updapt-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Windows VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 10m
          script: |
            powershell -Command "
              cd C:\Users\azureuser\Updapt
              git pull
              docker compose pull
              docker compose up -d
              Start-Sleep -Seconds 15
              $response = curl.exe -s -o $null -w '%{http_code}' http://localhost/health
              if ($response -ne '200') { throw 'Health check failed' }
              Write-Host 'Deploy success: /health returned 200'
            "
