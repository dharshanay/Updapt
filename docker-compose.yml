services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: updapt-frontend:latest
    restart: unless-stopped

  backend:
    build: ./backend
    image: updapt-backend:latest
    restart: unless-stopped
