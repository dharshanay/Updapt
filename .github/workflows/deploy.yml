name: Deploy to Azure Windows VM

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            dharshanay/backend:latest
            dharshanay/backend:${{ steps.vars.outputs.sha_short }}
          
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            dharshanay/frontend:latest
            dharshanay/frontend:${{ steps.vars.outputs.sha_short }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Windows VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 10m
          script: |
            powershell -Command "
              cd C:\Users\azureuser\Updapt
              
              # Save current image IDs for rollback
              $oldBackend = docker images dharshanay/backend:latest -q
              $oldFrontend = docker images dharshanay/frontend:latest -q
              
              git pull
              docker compose pull
              docker compose up -d
              Start-Sleep -Seconds 15
              
              # Health check with rollback
              try {
                $response = curl.exe -s -o $null -w '%{http_code}' http://localhost/health
                if ($response -ne '200') { throw 'Health check returned ' + $response }
                Write-Host 'Deploy success: /health returned 200'
              } catch {
                Write-Host 'Health check failed. Rolling back...'
                if ($oldBackend) { docker tag $oldBackend dharshanay/backend:latest }
                if ($oldFrontend) { docker tag $oldFrontend dharshanay/frontend:latest }
                docker compose up -d
                throw 'Deployment rolled back due to health check failure'
              }
            "