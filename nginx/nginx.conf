events {}

http {
    upstream backend {
        server backend:5000;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;

        # Health check - must return 200 for pipeline
        location = /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }

        # API routes
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend for everything else
        location / {
            proxy_pass http://frontend;
        }
    }
}
